# ==========================================
# SPRING DATA DATASOURCE (MySQL Connector)
# ==========================================
# Optional local-only override file. Create Java-Expense/backend/application-local.properties
# for machine-specific database credentials.
spring.config.import=optional:file:./application-local.properties

# DB_URL: Database connector pointing to local/production port
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/expense_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Hetarth@1508}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE SETTINGS
# ==========================================
# ddl-auto: 'update' automatically updates table schemas safely without wiping data.
# In production, this should be set to 'validate' or 'none' for SQL-centric deployments.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# APPLET EMBEDDED SERVER CONFIGURATION
# ==========================================
server.port=8080

# ==========================================
# SECURITY AND JWT TOKEN CONTEXT
# ==========================================
# Secret used to digitally sign JWT tokens. Must be at least 256 bits (32 characters).
# Note: NEVER expose a production key inside public repository files!
app.jwt.secret=${JWT_SECRET:}
# Expiration threshold: 86400000 ms is equal to 24 hours

# ==========================================
# CORS ORIGINS CONFIGURATION
# ==========================================
# FRONTEND_URL: Target origin for Axios credential authorization. Default is Vite dev server.
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
